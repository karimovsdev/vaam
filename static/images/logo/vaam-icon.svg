<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-labelledby="vaam-icon-title">
  <title id="vaam-icon-title">VAAM Logo Icon</title>
  <defs>
    <linearGradient id="ch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#cbd5e1"/>
      <stop offset="20%"  stop-color="#94a3b8"/>
      <stop offset="44%"  stop-color="#e2e8f0"/>
      <stop offset="56%"  stop-color="#94a3b8"/>
      <stop offset="80%"  stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="chIn" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#cbd5e1"/>
      <stop offset="50%"  stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="eF" x1="0%" y1="0%" x2="65%" y2="100%">
      <stop offset="0%"   stop-color="#6ee7b7"/>
      <stop offset="30%"  stop-color="#34d399"/>
      <stop offset="65%"  stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="eS" x1="20%" y1="0%" x2="100%" y2="75%">
      <stop offset="0%"   stop-color="#047857"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="eB" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#34d399"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="eEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#065f46"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="aF" x1="100%" y1="0%" x2="35%" y2="100%">
      <stop offset="0%"   stop-color="#fef3c7"/>
      <stop offset="30%"  stop-color="#fde68a"/>
      <stop offset="65%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="aS" x1="80%" y1="0%" x2="0%" y2="75%">
      <stop offset="0%"   stop-color="#b45309"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="aB" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </linearGradient>
    <linearGradient id="aEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#92400e"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <linearGradient id="sL" x1="0%" y1="0%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#334155"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="sR" x1="100%" y1="0%" x2="0%" y2="50%">
      <stop offset="0%"   stop-color="#475569"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <linearGradient id="spL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0.38"/>
      <stop offset="50%"  stop-color="#fff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="spR" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#fff" stop-opacity="0.33"/>
      <stop offset="50%"  stop-color="#fff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="fs" x="-12%" y="-8%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>

  </defs>

  <g transform="translate(128,128)" filter="url(#fs)">
    <!-- Definition stroke for white-bg contrast -->
    <circle cx="0" cy="0" r="105" fill="none" stroke="#475569" stroke-width="0.4" opacity="0.25"/>

    <!-- CHROME BEZEL -->
    <circle cx="0" cy="0" r="102" fill="none" stroke="url(#ch)" stroke-width="2.6"/>
    <circle cx="0" cy="0" r="98"  fill="none" stroke="url(#chIn)" stroke-width="0.6"/>
    <path d="M-68,-74 A100,100 0 0,1 28,-95" fill="none"
          stroke="#fff" stroke-width="0.6" opacity="0.18" stroke-linecap="round"/>

    <!-- DEGREE TICKS -->
    <g stroke="#94a3b8" stroke-linecap="round">
      <line x1="0" y1="-98" x2="0" y2="-102" stroke-width="0.5" transform="rotate(30)"/>
      <line x1="0" y1="-98" x2="0" y2="-102" stroke-width="0.5" transform="rotate(60)"/>
      <line x1="0" y1="-98" x2="0" y2="-102" stroke-width="0.5" transform="rotate(120)"/>
      <line x1="0" y1="-98" x2="0" y2="-102" stroke-width="0.5" transform="rotate(150)"/>
      <line x1="0" y1="-98" x2="0" y2="-102" stroke-width="0.5" transform="rotate(210)"/>
      <line x1="0" y1="-98" x2="0" y2="-102" stroke-width="0.5" transform="rotate(240)"/>
      <line x1="0" y1="-98" x2="0" y2="-102" stroke-width="0.5" transform="rotate(300)"/>
      <line x1="0" y1="-98" x2="0" y2="-102" stroke-width="0.5" transform="rotate(330)"/>
      <line x1="0" y1="-99" x2="0" y2="-102" stroke-width="0.25" transform="rotate(15)"/>
      <line x1="0" y1="-99" x2="0" y2="-102" stroke-width="0.25" transform="rotate(45)"/>
      <line x1="0" y1="-99" x2="0" y2="-102" stroke-width="0.25" transform="rotate(75)"/>
      <line x1="0" y1="-99" x2="0" y2="-102" stroke-width="0.25" transform="rotate(105)"/>
      <line x1="0" y1="-99" x2="0" y2="-102" stroke-width="0.25" transform="rotate(135)"/>
      <line x1="0" y1="-99" x2="0" y2="-102" stroke-width="0.25" transform="rotate(165)"/>
      <line x1="0" y1="-99" x2="0" y2="-102" stroke-width="0.25" transform="rotate(195)"/>
      <line x1="0" y1="-99" x2="0" y2="-102" stroke-width="0.25" transform="rotate(225)"/>
      <line x1="0" y1="-99" x2="0" y2="-102" stroke-width="0.25" transform="rotate(255)"/>
      <line x1="0" y1="-99" x2="0" y2="-102" stroke-width="0.25" transform="rotate(285)"/>
      <line x1="0" y1="-99" x2="0" y2="-102" stroke-width="0.25" transform="rotate(315)"/>
      <line x1="0" y1="-99" x2="0" y2="-102" stroke-width="0.25" transform="rotate(345)"/>
    </g>

    <!-- CARDINAL MARKS -->
    <rect x="-1.6" y="-114" width="3.2" height="15" rx="1.6" fill="url(#ch)"/>
    <rect x="-1.6" y="99"   width="3.2" height="15" rx="1.6" fill="url(#ch)"/>
    <rect x="-114" y="-1"   width="13"  height="2"  rx="1"   fill="url(#ch)"/>
    <rect x="101"  y="-1"   width="13"  height="2"  rx="1"   fill="url(#ch)"/>

    <!-- ORDINAL DOTS -->
    <circle cx="-73" cy="-73" r="1" fill="#94a3b8"/>
    <circle cx="73"  cy="-73" r="1" fill="#94a3b8"/>
    <circle cx="-73" cy="73"  r="1" fill="#94a3b8"/>
    <circle cx="73"  cy="73"  r="1" fill="#94a3b8"/>



    <!-- NORTH POINTER (connects to V top) -->
    <polygon points="0,-97 -8,-68 0,-73" fill="url(#sL)"/>
    <polygon points="0,-97  8,-68 0,-73" fill="url(#sR)"/>

    <!-- LEFT ARM (EMERALD) -->
    <polygon points="-50,-68 -21,-68 0,44 -8,57" fill="url(#eF)"/>
    <polygon points="-21,-68 0,44 0,25 -14,-55" fill="url(#eS)"/>
    <polygon points="-50,-68 -8,57 -7,54 -49,-66" fill="url(#eEdge)" opacity="0.40"/>
    <polygon points="-50,-68 -21,-68 -20,-65 -48,-65" fill="url(#eB)"/>
    <polygon points="-44,-68 -34,-68 -11,21 -16,21" fill="url(#spL)"/>

    <!-- RIGHT ARM (GOLD) -->
    <polygon points="50,-68 21,-68 0,44 8,57" fill="url(#aF)"/>
    <polygon points="21,-68 0,44 0,25 14,-55" fill="url(#aS)"/>
    <polygon points="50,-68 8,57 7,54 49,-66" fill="url(#aEdge)" opacity="0.40"/>
    <polygon points="50,-68 21,-68 20,-65 48,-65" fill="url(#aB)"/>
    <polygon points="34,-68 44,-68 11,21 16,21" fill="url(#spR)"/>

    <!-- SOUTH ARROW (connects to V bottom) -->
    <polygon points="0,97 -8,57 0,62" fill="url(#sL)"/>
    <polygon points="0,97  8,57 0,62" fill="url(#sR)"/>
  </g>
</svg>
