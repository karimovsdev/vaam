<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 220" width="780" height="220" role="img" aria-labelledby="vaam-hm-title">
  <title id="vaam-hm-title">VAAM &#x2014; Horizontal Logo Monochrome</title>

  <!-- COMPASS EMBLEM -->
  <g transform="translate(110,110) scale(0.714)" fill="#0f172a">
    <circle cx="0" cy="0" r="126" fill="none" stroke="currentColor" stroke-width="3"/>
    <circle cx="0" cy="0" r="121" fill="none" stroke="currentColor" stroke-width="0.6"/>
    <g stroke="currentColor" stroke-linecap="round">
      <line x1="0" y1="-121" x2="0" y2="-126" stroke-width="0.6" transform="rotate(30)"/>
      <line x1="0" y1="-121" x2="0" y2="-126" stroke-width="0.6" transform="rotate(60)"/>
      <line x1="0" y1="-121" x2="0" y2="-126" stroke-width="0.6" transform="rotate(120)"/>
      <line x1="0" y1="-121" x2="0" y2="-126" stroke-width="0.6" transform="rotate(150)"/>
      <line x1="0" y1="-121" x2="0" y2="-126" stroke-width="0.6" transform="rotate(210)"/>
      <line x1="0" y1="-121" x2="0" y2="-126" stroke-width="0.6" transform="rotate(240)"/>
      <line x1="0" y1="-121" x2="0" y2="-126" stroke-width="0.6" transform="rotate(300)"/>
      <line x1="0" y1="-121" x2="0" y2="-126" stroke-width="0.6" transform="rotate(330)"/>
    </g>
    <rect x="-2" y="-140" width="4" height="18" rx="2" fill="currentColor"/>
    <rect x="-2" y="122"  width="4" height="18" rx="2" fill="currentColor"/>
    <rect x="-140" y="-1.2" width="16" height="2.4" rx="1.2" fill="currentColor"/>
    <rect x="124"  y="-1.2" width="16" height="2.4" rx="1.2" fill="currentColor"/>
    <circle cx="-90" cy="-90" r="1.2" fill="currentColor"/>
    <circle cx="90"  cy="-90" r="1.2" fill="currentColor"/>
    <circle cx="-90" cy="90"  r="1.2" fill="currentColor"/>
    <circle cx="90"  cy="90"  r="1.2" fill="currentColor"/>
    <polygon points="0,-120 -10,-84 0,-90" fill="currentColor"/>
    <polygon points="0,-120  10,-84 0,-90" fill="currentColor" opacity="0.7"/>
    <polygon points="-62,-84 -26,-84 0,54 -10,70" fill="currentColor"/>
    <polygon points="-26,-84 0,54 0,30 -17,-68" fill="currentColor" opacity="0.6"/>
    <polygon points="62,-84 26,-84 0,54 10,70" fill="currentColor" opacity="0.8"/>
    <polygon points="26,-84 0,54 0,30 17,-68" fill="currentColor" opacity="0.5"/>
    <polygon points="0,120 -10,70 0,76" fill="currentColor"/>
    <polygon points="0,120  10,70 0,76" fill="currentColor" opacity="0.7"/>
  </g>

  <!-- VERTICAL DIVIDER -->
  <line x1="232" y1="35" x2="232" y2="185" stroke="currentColor" stroke-width="1" opacity="0.3"/>

  <!-- WORDMARK -->
  <text x="260" y="98" font-family="'Plus Jakarta Sans','Arial Black','Segoe UI',sans-serif" font-weight="800" font-size="56" letter-spacing="10" fill="#0f172a">VAAM</text>

  <!-- ACCENT DIVIDER -->
  <line x1="261" y1="114" x2="444" y2="114" stroke="#0f172a" stroke-width="1" opacity="0.3"/>

  <!-- TAGLINE -->
  <text x="263" y="148" font-family="'Inter','Segoe UI',Arial,sans-serif" font-weight="500" font-size="17" letter-spacing="4" fill="#0f172a" opacity="0.5">IMPORT &#xB7; EXPORT &#xB7; TRADING</text>
</svg>
