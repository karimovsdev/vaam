<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500" role="img" aria-labelledby="vaam-white-title">
  <title id="vaam-white-title">VAAM Logo — White</title>
  <!-- VAAM White Mono Logo — for dark backgrounds -->
  <g transform="translate(200,190) scale(0.92)" fill="#ffffff">

    <!-- COMPASS BEZEL -->
    <circle cx="0" cy="0" r="126" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.9"/>
    <circle cx="0" cy="0" r="121" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.4"/>

    <!-- DEGREE TICKS -->
    <g stroke="#ffffff" stroke-linecap="round" opacity="0.5">
      <line x1="0" y1="-121" x2="0" y2="-126" stroke-width="0.6" transform="rotate(30)"/>
      <line x1="0" y1="-121" x2="0" y2="-126" stroke-width="0.6" transform="rotate(60)"/>
      <line x1="0" y1="-121" x2="0" y2="-126" stroke-width="0.6" transform="rotate(120)"/>
      <line x1="0" y1="-121" x2="0" y2="-126" stroke-width="0.6" transform="rotate(150)"/>
      <line x1="0" y1="-121" x2="0" y2="-126" stroke-width="0.6" transform="rotate(210)"/>
      <line x1="0" y1="-121" x2="0" y2="-126" stroke-width="0.6" transform="rotate(240)"/>
      <line x1="0" y1="-121" x2="0" y2="-126" stroke-width="0.6" transform="rotate(300)"/>
      <line x1="0" y1="-121" x2="0" y2="-126" stroke-width="0.6" transform="rotate(330)"/>
    </g>

    <!-- CARDINAL MARKERS -->
    <rect x="-2" y="-140" width="4" height="18" rx="2" fill="#ffffff"/>
    <rect x="-2" y="122"  width="4" height="18" rx="2" fill="#ffffff"/>
    <rect x="-140" y="-1.2" width="16" height="2.4" rx="1.2" fill="#ffffff"/>
    <rect x="124"  y="-1.2" width="16" height="2.4" rx="1.2" fill="#ffffff"/>

    <!-- ORDINAL DOTS -->
    <circle cx="-90" cy="-90" r="1.2" fill="#ffffff" opacity="0.5"/>
    <circle cx="90"  cy="-90" r="1.2" fill="#ffffff" opacity="0.5"/>
    <circle cx="-90" cy="90"  r="1.2" fill="#ffffff" opacity="0.5"/>
    <circle cx="90"  cy="90"  r="1.2" fill="#ffffff" opacity="0.5"/>

    <!-- NORTH POINTER -->
    <polygon points="0,-120 -10,-84 0,-90" fill="#ffffff"/>
    <polygon points="0,-120  10,-84 0,-90" fill="#ffffff" opacity="0.7"/>

    <!-- LEFT V ARM -->
    <polygon points="-62,-84 -26,-84 0,54 -10,70" fill="#ffffff"/>
    <polygon points="-26,-84 0,54 0,30 -17,-68" fill="#ffffff" opacity="0.6"/>

    <!-- RIGHT V ARM -->
    <polygon points="62,-84 26,-84 0,54 10,70" fill="#ffffff" opacity="0.85"/>
    <polygon points="26,-84 0,54 0,30 17,-68" fill="#ffffff" opacity="0.5"/>

    <!-- SOUTH POINTER -->
    <polygon points="0,120 -10,70 0,76" fill="#ffffff"/>
    <polygon points="0,120  10,70 0,76" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- ACCENT DIVIDER -->
  <line x1="148" y1="365" x2="252" y2="365" stroke="#ffffff" stroke-width="1" opacity="0.25"/>

